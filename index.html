<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FamePOS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.0/dist/JsBarcode.all.min.js"></script>

  <link rel="icon" type="image/png" href="https://i.postimg.cc/Zq4bVKtG/f382619b-f336-4812-b4e4-37d62e1041a6.png" sizes="192x192">
  <link rel="apple-touch-icon" href="https://i.postimg.cc/Zq4bVKtG/f382619b-f336-4812-b4e4-37d62e1041a6.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="FamePOS">
  <meta name="mobile-web-app-capable" content="yes">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap');
    body { font-family: 'Kanit', sans-serif; background-color: #ecfdf5; color: #064e3b; margin: 0; }
    .modern-card { background: white; border: 1px solid #d1fae5; border-radius: 1.5rem; transition: 0.2s; }
    .modern-card:hover { transform: translateY(-5px); box-shadow: 0 10px 15px -3px rgba(16, 185, 129, 0.1); }
    .receipt-slip { font-family: 'Courier New', Courier, monospace; background: white; color: black; margin: auto; box-shadow: 0 4px 15px rgba(0,0,0,0.1); transition: all 0.3s ease; }
    .dashed-line { border-top: 1px dashed #ccc; margin: 10px 0; }
    .slip-80mm { max-width: 320px; font-size: 14px; padding: 20px; }
    .slip-58mm { max-width: 220px; font-size: 11px; padding: 10px; }
    .slip-a4   { max-width: 794px; font-size: 16px; padding: 40px; min-height: 1123px; }
    
    @media print {
      body { height: auto !important; overflow: visible !important; }
      body > :not(.print-active-view):not(#receiptModal:not(.hidden)) { display: none !important; }
      .print-active-view, #receiptModal:not(.hidden) { display: block !important; position: absolute !important; left: 0 !important; top: 0 !important; width: 100% !important; height: auto !important; background: white !important; padding: 0 !important; overflow: visible !important; }
      ::-webkit-scrollbar { display: none !important; }
      .no-print { display: none !important; }
      .receipt-slip { box-shadow: none !important; margin: 0 !important; }
      * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
    }
  </style>
</head>
<body class="h-screen flex overflow-hidden">
  
  <div id="toastContainer" class="fixed top-5 right-5 z-[10000] flex flex-col gap-3 pointer-events-none w-80"></div>

  <div id="loginOverlay" class="fixed inset-0 bg-gradient-to-br from-emerald-50 via-white to-emerald-100 flex flex-col items-center justify-center z-[9999] p-4">
    <div class="bg-white p-10 rounded-[2.5rem] shadow-2xl w-full max-w-md border border-emerald-100 flex flex-col items-center text-center">
      <img src="https://i.postimg.cc/Zq4bVKtG/f382619b-f336-4812-b4e4-37d62e1041a6.png" class="w-24 h-24 object-contain mb-4 drop-shadow-md">
      <h2 class="text-3xl font-bold text-gray-800">FamePOS</h2>
      <p class="text-gray-500 text-sm mt-1 mb-8">ระบบจัดการร้านค้า ยินดีให้บริการ</p>
      
      <div class="space-y-5 w-full text-left">
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1.5">ชื่อพนักงาน หรือ เบอร์โทรศัพท์</label>
          <input type="text" id="loginUsername" class="w-full p-3.5 border-2 border-gray-100 rounded-2xl focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 transition font-medium" placeholder="กรอกชื่อพนักงาน">
        </div>
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1.5">รหัสผ่าน (PIN)</label>
          <input type="password" id="loginPassword" class="w-full p-3.5 border-2 border-gray-100 rounded-2xl focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 text-center tracking-widest text-2xl font-bold transition" placeholder="••••">
        </div>
        <button onclick="processLogin()" id="btnLoginSubmit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold p-4 rounded-2xl transition duration-200 shadow-md flex items-center justify-center space-x-2 text-lg mt-2">
          <span>🚀 เข้าสู่ระบบร้านค้า</span>
        </button>
      </div>
    </div>
    <span class="text-gray-400 text-xs mt-6">Powered by FamePOS</span>
  </div>

  <div class="w-20 lg:w-64 bg-white border-r border-emerald-100 p-6 flex flex-col shadow-sm z-10">
    <h1 class="text-2xl font-bold text-emerald-600 mb-4 flex items-center gap-2">
        <img id="sidebarLogo" src="" class="w-8 h-8 rounded-lg object-cover hidden">
        <span id="sidebarLogoFallback" class="bg-emerald-500 text-white p-2 rounded-xl">F</span> 
        <span id="sidebarStoreName" class="hidden lg:block truncate">FamePOS</span>
    </h1>

    <div id="digitalClockContainer" class="mb-6 hidden lg:flex flex-col p-3 bg-slate-50 rounded-2xl border border-gray-100 text-center font-semibold">
        <div id="clockTime" class="text-xl font-bold text-emerald-700 tracking-wider">00:00:00</div>
        <div id="clockDate" class="text-[11px] text-gray-400 mt-0.5">วันเสาร์ที่ 6 มิ.ย. 2026</div>
    </div>

    <nav class="space-y-4">
      <a id="nav-sales" class="flex items-center gap-3 text-emerald-700 bg-emerald-50 p-3 rounded-xl font-semibold cursor-pointer transition">
        <span class="text-xl">🛒</span> <span class="hidden lg:block">ขายสินค้า</span>
      </a>
      <a id="nav-history" class="flex items-center gap-3 text-gray-500 p-3 rounded-xl hover:bg-emerald-50 hover:text-emerald-600 font-semibold cursor-pointer transition">
        <span class="text-xl">📜</span> <span class="hidden lg:block">บิลทั้งหมด</span>
      </a>
      <a id="nav-products" class="flex items-center gap-3 text-gray-500 p-3 rounded-xl hover:bg-emerald-50 hover:text-emerald-600 font-semibold cursor-pointer transition">
        <span class="text-xl">📑</span> <span class="hidden lg:block">จัดการสินค้า</span>
      </a>
    </nav>
    <div class="mt-auto pt-6 border-t border-emerald-50 hidden lg:block">
        <div id="userStatusContainer"></div>
    </div>
  </div>

  <div id="salesView" class="flex w-full h-full">
    <div class="flex-1 p-8 overflow-y-auto flex flex-col relative">
        <div class="flex flex-wrap items-center justify-between gap-4 mb-4">
            <h1 class="text-2xl font-bold whitespace-nowrap">☕ เลือกสินค้า</h1>
            <div class="flex flex-wrap items-center gap-3 w-full xl:w-auto">
                <input type="text" id="salesSearchInput" oninput="filterProducts()" placeholder="🔍 ค้นหาชื่อ, บาร์โค้ด..." class="p-3 rounded-xl border-2 border-emerald-100 focus:border-emerald-500 outline-none w-full sm:w-64 font-medium shadow-sm">
            </div>
        </div>
        <div id="categoryButtonGroup" class="flex flex-wrap gap-2 mb-6"></div>
        <div id="productGrid" class="grid grid-cols-2 lg:grid-cols-4 gap-6 content-start"></div>
    </div>
    
    <div class="w-96 bg-white border-l border-emerald-100 p-8 flex flex-col shadow-xl z-10">
        <h2 class="text-xl font-bold mb-6 border-b pb-4 border-emerald-100">🛒 ตะกร้าสินค้า</h2>
        <div id="cartItems" class="flex-1 overflow-y-auto space-y-3 pr-2"></div>
        <div class="pt-6 border-t border-emerald-100 mt-auto">
            <div class="flex justify-between text-2xl font-bold mb-6"><span>รวม</span><span id="totalPrice" class="text-emerald-600">฿0.00</span></div>
            <button class="w-full bg-emerald-500 text-white p-4 rounded-2xl font-bold text-lg hover:bg-emerald-600 shadow-md transition">ชำระเงิน</button>
        </div>
    </div>
  </div>

  <script>
    const BASE_URL = "https://script.google.com/macros/s/AKfycbzCltmzwnC1g86R6jccC4yWHS6H8bjWJwX-Lc6XqYmfSAu8lQ_3CtfcSDOgHhxiRzOPfw/exec";
    let allSalesProducts = [];
    let globalBranchesList = [];
    let cart = [];

    function callJsonpAPI(params, callbackName, callbackFunction) {
      window[callbackName] = function(data) {
        callbackFunction(data);
        document.getElementById(callbackName)?.remove();
      };
      let queryStr = Object.keys(params).map(k => `${k}=${encodeURIComponent(params[k])}`).join('&');
      let script = document.createElement('script');
      script.id = callbackName;
      script.src = `${BASE_URL}?${queryStr}&callback=${callbackName}`;
      document.body.appendChild(script);
    }

    function showToast(message, type) {
      let typeStr = type || 'success';
      const container = document.getElementById('toastContainer');
      if (!container) return; 
      const toast = document.createElement('div');
      toast.className = typeStr === 'success' ? 'flex items-center gap-3 bg-emerald-600 text-white px-6 py-4 rounded-2xl shadow-2xl transform transition-all duration-300 translate-x-full opacity-0 pointer-events-auto font-bold text-lg' : 'flex items-center gap-3 bg-red-500 text-white px-6 py-4 rounded-2xl shadow-2xl transform transition-all duration-300 translate-x-full opacity-0 pointer-events-auto font-bold text-lg';
      toast.innerHTML = typeStr === 'success' ? '<span class="text-xl">✅</span> <span>' + message + '</span>' : '<span class="text-xl">❌</span> <span>' + message + '</span>';
      container.appendChild(toast);
      setTimeout(() => { toast.classList.remove('translate-x-full', 'opacity-0'); toast.classList.add('translate-x-0', 'opacity-100'); }, 50);
      setTimeout(() => { toast.classList.remove('translate-x-0', 'opacity-100'); toast.classList.add('translate-x-full', 'opacity-0'); setTimeout(() => { toast.remove(); }, 300); }, 3000);
    }

    function processLogin() {
      let user = document.getElementById('loginUsername').value.trim();
      let pass = document.getElementById('loginPassword').value.trim();
      if (!user || !pass) { showToast("กรุณากรอกข้อมูลให้ครบถ้วน", "error"); return; }
      let btn = document.getElementById('btnLoginSubmit');
      if (btn) { btn.innerHTML = `<span>⏳ ตรวจสอบ...</span>`; btn.disabled = true; }
      
      callJsonpAPI({ action: "checkLogin", username: user, password: pass }, "handleLogin", function(res) {
        if (btn) { btn.innerHTML = `<span>🚀 เข้าสู่ระบบร้านค้า</span>`; btn.disabled = false; }
        if (res && res.status === "Success") {
          window.currentUser = res.name; window.currentRole = res.role; window.currentBranch = res.branch;
          localStorage.setItem('famepos_user', JSON.stringify(res));
          showToast(`ยินดีต้อนรับคุณ ${res.name}`, "success");
          document.getElementById('loginOverlay')?.classList.add('hidden');
          fetchProductsViaAPI();
          fetchBranchesViaAPI();
        } else { showToast(res.message || "รหัสผ่านไม่ถูกต้อง", "error"); }
      });
    }

    function fetchProductsViaAPI() {
      callJsonpAPI({ action: "getProducts" }, "handleProducts", function(data) {
        if (data && data.length > 0) {
          allSalesProducts = data;
          renderProductGrid(data);
        }
      });
    }

    function renderProductGrid(data) {
      let grid = document.getElementById('productGrid');
      if (!grid) return;
      let html = '';
      data.forEach(row => {
        let name = row[1] || "ไม่มีชื่อ"; let price = row[3] || 0; let imageUrl = row[8] || "";
        let imgTag = imageUrl ? `<img src="${imageUrl}" class="w-full h-full object-cover rounded-xl">` : `<div class="bg-emerald-50 w-full h-full rounded-xl flex items-center justify-center text-4xl">📦</div>`;
        html += `<div class="modern-card p-4 cursor-pointer flex flex-col h-full bg-white relative">
            <div class="h-28 w-full mb-3 flex items-center justify-center overflow-hidden rounded-xl bg-white relative">${imgTag}</div>
            <h3 class="font-bold text-center text-gray-800 text-sm">${name}</h3>
            <p class="text-emerald-600 font-bold text-center mt-auto text-lg">฿${parseFloat(price).toFixed(2)}</p>
        </div>`;
      });
      grid.innerHTML = html;
    }

    function fetchBranchesViaAPI() { callJsonpAPI({ action: "getBranchesData" }, "handleBranches", function(data) { if (data) globalBranchesList = data; }); }
    function fetchStoreSettingsViaAPI() { callJsonpAPI({ action: "getStoreSettings" }, "handleStoreSettings", function(settings) { if (settings) console.log("โหลดข้อมูลร้านสำเร็จ"); }); }

    window.addEventListener('load', function() {
      fetchStoreSettingsViaAPI();
      let savedUser = localStorage.getItem('famepos_user');
      if (savedUser) {
        let res = JSON.parse(savedUser);
        window.currentUser = res.name; window.currentRole = res.role; window.currentBranch = res.branch;
        document.getElementById('loginOverlay')?.classList.add('hidden');
        fetchProductsViaAPI(); fetchBranchesViaAPI();
      }
    });
  </script>
</body>
</html>
