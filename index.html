<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap');
    body { font-family: 'Kanit', sans-serif; background-color: #ecfdf5; color: #064e3b; margin: 0; }
    .modern-card { background: white; border: 1px solid #d1fae5; border-radius: 1.5rem; transition: 0.2s; }
    .modern-card:hover { transform: translateY(-5px); box-shadow: 0 10px 15px -3px rgba(16, 185, 129, 0.1); }
  </style>
</head>
<body class="h-screen flex overflow-hidden">

  <div id="toastContainer" class="fixed top-5 right-5 z-[9999] flex flex-col gap-3 pointer-events-none"></div>
  
  <script>
    // 🔗 แก้ไขบรรทัดนี้: ลิงก์จาก Google Apps Script (ต้องมี /exec ต่อท้าย)
    const API_URL = "https://script.google.com/macros/s/AKfycbyVcq0Iz6iNGRRoTEAxae3u_Gdbf6Fy8bQ3ujvri6F3g1gibZd2ghMiqqcdHjy6bb5PUg/exec";

    // ฟังก์ชันหลักสำหรับสื่อสารกับ Google Sheets
    async function callAPI(action, data = {}) {
      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          body: JSON.stringify({ action: action, data: data })
        });
        return await response.json();
      } catch (error) {
        console.error("API Error:", error);
        return { status: "Error", message: error.message };
      }
    }

    // ฟังก์ชันช่วยแสดงแจ้งเตือน
    function showToast(message, type) {
      let typeStr = type || 'success';
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      let bgColor = typeStr === 'success' ? 'bg-emerald-600' : 'bg-red-500';
      toast.className = 'flex items-center gap-3 ' + bgColor + ' text-white px-6 py-4 rounded-2xl shadow-2xl transition-all duration-300';
      toast.innerHTML = '<span class="font-bold">' + message + '</span>';
      container.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    // --- โหลดข้อมูลสินค้า ---
    async function loadProductGrid() {
      let data = await callAPI('getProducts');
      if (data && Array.isArray(data)) {
        let grid = document.getElementById('productGrid');
        grid.innerHTML = '';
        data.forEach(function(row) {
          let safeName = row[1].toString().replace(/'/g, "\\'").replace(/"/g, '&quot;');
          let cardHtml = '<div class="modern-card p-4 cursor-pointer" onclick="addToCart(\'' + safeName + '\', ' + row[3] + ')">' +
            '<div class="bg-emerald-50 h-24 rounded-xl flex items-center justify-center text-4xl mb-3">🍵</div>' +
            '<h3 class="font-bold text-center">' + row[1] + '</h3><p class="text-emerald-600 font-bold text-center">฿' + row[3] + '</p></div>';
          grid.innerHTML += cardHtml;
        });
      }
    }

    // --- โหลดข้อมูลสินค้าในหน้า Admin ---
    async function loadAdminProducts() {
      let products = await callAPI('getAdminProducts');
      if (products && Array.isArray(products)) {
        let html = '';
        products.forEach((p, index) => {
          html += `<tr>...ตารางสินค้าของคุณ...</tr>`;
        });
        document.getElementById('productTableBody').innerHTML = html;
      }
    }

    // --- ฟังก์ชันบันทึกข้อมูลสินค้า ---
    async function saveProduct() {
      let btn = document.getElementById('btnSaveProduct');
      btn.innerText = "กำลังบันทึก..."; btn.disabled = true;
      
      let data = { /* ดึงค่าจาก input เหมือนเดิม */ };
      let res = await callAPI('saveProduct', data);
      
      btn.innerText = "บันทึกข้อมูลสินค้า"; btn.disabled = false;
      if (res.status === "Success") {
        showToast("บันทึกสำเร็จ", "success");
        closeProductModal();
        loadAdminProducts();
      } else {
        showToast("เกิดข้อผิดพลาด: " + res.message, "error");
      }
    }

    // --- ฟังก์ชันลบสินค้า (เชื่อม Modal) ---
    let deleteTarget = { rowIdx: null };
    function deleteProduct(rowIdx, name) {
        deleteTarget.rowIdx = rowIdx;
        document.getElementById('deleteMsg').innerText = `คุณต้องการลบ "${name}" ใช่หรือไม่?`;
        document.getElementById('confirmDeleteModal').classList.remove('hidden');
    }

    document.getElementById('btnConfirmDelete').onclick = async function() {
        let res = await callAPI('deleteProduct', { rowIdx: deleteTarget.rowIdx });
        document.getElementById('confirmDeleteModal').classList.add('hidden');
        if(res.status === "Success") {
            showToast("ลบสำเร็จ", "success");
            loadAdminProducts();
        }
    };

    // เริ่มต้นทำงาน
    loadProductGrid();
    
  </script>
</body>
</html>
